# maps release series of major.minor to cluster-api contract version
# the contract version may change between minor or major versions, but *not*
# between patch versions.
#
# update this file only when a new major or minor version is released
#
# apiVersion follows the clusterctl metadata API version defined in
# sigs.k8s.io/cluster-api/cmd/clusterctl/api/<version>/groupversion_info.go
# It should match the version used in CAPI's own metadata.yaml.
apiVersion: clusterctl.cluster.x-k8s.io/v1alpha3
kind: Metadata
releaseSeries:
  - major: 0
    minor: 7
    contract: v1beta2
  - major: 0
    minor: 6
    contract: v1beta1
  - major: 0
    minor: 5
    contract: v1beta1
  - major: 0
    minor: 4
    contract: v1beta1
  - major: 0
    minor: 3
    contract: v1beta1
  - major: 0
    minor: 1
    contract: v1beta1
