---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: tinkerbellmachines.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: TinkerbellMachine
    listKind: TinkerbellMachineList
    plural: tinkerbellmachines
    singular: tinkerbellmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Cluster to which this TinkerbellMachine belongs
      jsonPath: .metadata.labels.cluster\.x-k8s\.io/cluster-name
      name: Cluster
      type: string
    - description: Tinkerbell instance state
      jsonPath: .status.instanceState
      name: State
      type: string
    - description: Machine ready status
      jsonPath: .status.ready
      name: Ready
      type: string
    - description: Tinkerbell instance ID
      jsonPath: .spec.providerID
      name: InstanceID
      type: string
    - description: Machine object which owns with this TinkerbellMachine
      jsonPath: .metadata.ownerReferences[?(@.kind=="Machine")].name
      name: Machine
      type: string
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: TinkerbellMachine is the Schema for the tinkerbellmachines API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TinkerbellMachineSpec defines the desired state of TinkerbellMachine.
            properties:
              bootOptions:
                description: BootOptions are options that control the booting of Hardware.
                properties:
                  bootMode:
                    description: BootMode is the type of booting that will be done.
                      One of "netboot", "isoboot", or "customboot".
                    enum:
                    - netboot
                    - isoboot
                    - iso
                    - customboot
                    type: string
                  custombootConfig:
                    description: |-
                      CustombootConfig is the configuration for the "customboot" boot mode.
                      This allows users to define custom BMC Actions.
                    properties:
                      postActions:
                        description: |-
                          PostActions are the BMC Actions that will be run after all Workflow Actions have completed.
                          In most cases these Actions should get a Machine into a state where it can be powered off or rebooted and remove any mounted virtual media.
                          These Actions will be run only if the main Workflow Actions complete successfully.
                        items:
                          description: |-
                            Action represents the action to be performed.
                            A single task can only perform one type of action.
                            For example either PowerAction or OneTimeBootDeviceAction.
                          maxProperties: 1
                          properties:
                            bootDevice:
                              description: BootDevice is the device to set as the
                                first boot device on the Machine.
                              properties:
                                device:
                                  description: Device is the name of the device to
                                    set as the first boot device.
                                  type: string
                                efiBoot:
                                  description: EFIBoot indicates whether the boot
                                    device should be set to efiboot mode.
                                  type: boolean
                                persistent:
                                  description: Persistent indicates whether the boot
                                    device should be set persistently as the first
                                    boot device.
                                  type: boolean
                              type: object
                            oneTimeBootDeviceAction:
                              description: |-
                                OneTimeBootDeviceAction represents a baseboard management one time set boot device operation.

                                Deprecated: This field is deprecated and will be removed in a future release. Use bootDevice instead.
                              properties:
                                device:
                                  description: |-
                                    Devices represents the boot devices, in order for setting one time boot.
                                    Currently only the first device in the slice is used to set one time boot.
                                  items:
                                    description: BootDevice represents boot device
                                      of the Machine.
                                    type: string
                                  type: array
                                efiBoot:
                                  description: EFIBoot instructs the machine to use
                                    EFI boot.
                                  type: boolean
                              required:
                              - device
                              type: object
                            powerAction:
                              description: PowerAction represents a baseboard management
                                power operation.
                              enum:
                              - "on"
                              - "off"
                              - soft
                              - status
                              - cycle
                              - reset
                              type: string
                            virtualMediaAction:
                              description: VirtualMediaAction represents a baseboard
                                management virtual media insert/eject.
                              properties:
                                kind:
                                  description: Kind represents the kind of virtual
                                    media.
                                  type: string
                                mediaURL:
                                  description: mediaURL represents the URL of the
                                    image to be inserted into the virtual media, or
                                    empty to eject media.
                                  type: string
                              required:
                              - kind
                              type: object
                          type: object
                        type: array
                      preparingActions:
                        description: |-
                          PreparingActions are the BMC Actions that will be run before any Workflow Actions.
                          In most cases these Actions should get a Machine into a state where a Tink Agent is running.
                        items:
                          description: |-
                            Action represents the action to be performed.
                            A single task can only perform one type of action.
                            For example either PowerAction or OneTimeBootDeviceAction.
                          maxProperties: 1
                          properties:
                            bootDevice:
                              description: BootDevice is the device to set as the
                                first boot device on the Machine.
                              properties:
                                device:
                                  description: Device is the name of the device to
                                    set as the first boot device.
                                  type: string
                                efiBoot:
                                  description: EFIBoot indicates whether the boot
                                    device should be set to efiboot mode.
                                  type: boolean
                                persistent:
                                  description: Persistent indicates whether the boot
                                    device should be set persistently as the first
                                    boot device.
                                  type: boolean
                              type: object
                            oneTimeBootDeviceAction:
                              description: |-
                                OneTimeBootDeviceAction represents a baseboard management one time set boot device operation.

                                Deprecated: This field is deprecated and will be removed in a future release. Use bootDevice instead.
                              properties:
                                device:
                                  description: |-
                                    Devices represents the boot devices, in order for setting one time boot.
                                    Currently only the first device in the slice is used to set one time boot.
                                  items:
                                    description: BootDevice represents boot device
                                      of the Machine.
                                    type: string
                                  type: array
                                efiBoot:
                                  description: EFIBoot instructs the machine to use
                                    EFI boot.
                                  type: boolean
                              required:
                              - device
                              type: object
                            powerAction:
                              description: PowerAction represents a baseboard management
                                power operation.
                              enum:
                              - "on"
                              - "off"
                              - soft
                              - status
                              - cycle
                              - reset
                              type: string
                            virtualMediaAction:
                              description: VirtualMediaAction represents a baseboard
                                management virtual media insert/eject.
                              properties:
                                kind:
                                  description: Kind represents the kind of virtual
                                    media.
                                  type: string
                                mediaURL:
                                  description: mediaURL represents the URL of the
                                    image to be inserted into the virtual media, or
                                    empty to eject media.
                                  type: string
                              required:
                              - kind
                              type: object
                          type: object
                        type: array
                    type: object
                  isoURL:
                    description: |-
                      ISOURL is the URL of the ISO that will be one-time booted.
                      A HardwareRef that contains a spec.BmcRef must be provided.

                      The format of the ISOURL must be http://$IP:$Port/iso/hook.iso
                      The name of the ISO file must have the .iso extension, but the name can be anything.
                      The $IP and $Port should generally point to the IP and Port of the Smee server
                      as this is where the ISO patching endpoint lives.
                      The controller will append the MAC address of the hardware in the ISO URL
                      right before the iso file name in the URL.
                      MAC address is then used to retrieve hardware specific information such as
                      IPAM info, custom kernel cmd line args and populate the worker ID for the tink worker/agent.
                      For ex. the above format would be replaced to http://$IP:$Port/iso/<macAddress>/hook.iso

                      BootMode must be set to "isoboot".
                    format: uri
                    type: string
                type: object
              hardwareAffinity:
                description: HardwareAffinity allows filtering for hardware.
                properties:
                  preferred:
                    description: |-
                      Preferred are the preferred hardware affinity terms. Hardware matching these terms are preferred according to the
                      weights provided, but are not required.
                    items:
                      description: |-
                        WeightedHardwareAffinityTerm is a HardwareAffinityTerm with an associated weight.  The weights of all the matched
                        WeightedHardwareAffinityTerm fields are added per-hardware to find the most preferred hardware.
                      properties:
                        hardwareAffinityTerm:
                          description: HardwareAffinityTerm is the term associated
                            with the corresponding weight.
                          properties:
                            labelSelector:
                              description: LabelSelector is used to select for particular
                                hardware by label.
                              properties:
                                matchExpressions:
                                  description: matchExpressions is a list of label
                                    selector requirements. The requirements are ANDed.
                                  items:
                                    description: |-
                                      A label selector requirement is a selector that contains values, a key, and an operator that
                                      relates the key and values.
                                    properties:
                                      key:
                                        description: key is the label key that the
                                          selector applies to.
                                        type: string
                                      operator:
                                        description: |-
                                          operator represents a key's relationship to a set of values.
                                          Valid operators are In, NotIn, Exists and DoesNotExist.
                                        type: string
                                      values:
                                        description: |-
                                          values is an array of string values. If the operator is In or NotIn,
                                          the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                          the values array must be empty. This array is replaced during a strategic
                                          merge patch.
                                        items:
                                          type: string
                                        type: array
                                        x-kubernetes-list-type: atomic
                                    required:
                                    - key
                                    - operator
                                    type: object
                                  type: array
                                  x-kubernetes-list-type: atomic
                                matchLabels:
                                  additionalProperties:
                                    type: string
                                  description: |-
                                    matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                    map is equivalent to an element of matchExpressions, whose key field is "key", the
                                    operator is "In", and the values array contains only "value". The requirements are ANDed.
                                  type: object
                              type: object
                              x-kubernetes-map-type: atomic
                          required:
                          - labelSelector
                          type: object
                        weight:
                          description: Weight associated with matching the corresponding
                            hardwareAffinityTerm, in the range 1-100.
                          format: int32
                          maximum: 100
                          minimum: 1
                          type: integer
                      required:
                      - hardwareAffinityTerm
                      - weight
                      type: object
                    type: array
                  required:
                    description: |-
                      Required are the required hardware affinity terms.  The terms are OR'd together, hardware must match one term to
                      be considered.
                    items:
                      description: HardwareAffinityTerm is used to select for a particular
                        existing hardware resource.
                      properties:
                        labelSelector:
                          description: LabelSelector is used to select for particular
                            hardware by label.
                          properties:
                            matchExpressions:
                              description: matchExpressions is a list of label selector
                                requirements. The requirements are ANDed.
                              items:
                                description: |-
                                  A label selector requirement is a selector that contains values, a key, and an operator that
                                  relates the key and values.
                                properties:
                                  key:
                                    description: key is the label key that the selector
                                      applies to.
                                    type: string
                                  operator:
                                    description: |-
                                      operator represents a key's relationship to a set of values.
                                      Valid operators are In, NotIn, Exists and DoesNotExist.
                                    type: string
                                  values:
                                    description: |-
                                      values is an array of string values. If the operator is In or NotIn,
                                      the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                      the values array must be empty. This array is replaced during a strategic
                                      merge patch.
                                    items:
                                      type: string
                                    type: array
                                    x-kubernetes-list-type: atomic
                                required:
                                - key
                                - operator
                                type: object
                              type: array
                              x-kubernetes-list-type: atomic
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: |-
                                matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                map is equivalent to an element of matchExpressions, whose key field is "key", the
                                operator is "In", and the values array contains only "value". The requirements are ANDed.
                              type: object
                          type: object
                          x-kubernetes-map-type: atomic
                      required:
                      - labelSelector
                      type: object
                    type: array
                type: object
              hardwareName:
                description: |-
                  Those fields are set programmatically, but they cannot be re-constructed from "state of the world", so
                  we put them in spec instead of status.
                type: string
              imageLookupBaseRegistry:
                description: |-
                  ImageLookupBaseRegistry is the base Registry URL that is used for pulling images,
                  if not set, the default will be to use ghcr.io/tinkerbell/cluster-api-provider-tinkerbell.
                type: string
              imageLookupFormat:
                description: |-
                  ImageLookupFormat is the URL naming format to use for machine images when
                  a machine does not specify. When set, this will be used for all cluster machines
                  unless a machine specifies a different ImageLookupFormat. Supports substitutions
                  for {{.BaseRegistry}}, {{.OSDistro}}, {{.OSVersion}} and {{.KubernetesVersion}} with
                  the basse URL, OS distribution, OS version, and kubernetes version, respectively.
                  BaseRegistry will be the value in ImageLookupBaseRegistry or ghcr.io/tinkerbell/cluster-api-provider-tinkerbell
                  (the default), OSDistro will be the value in ImageLookupOSDistro or ubuntu (the default),
                  OSVersion will be the value in ImageLookupOSVersion or default based on the OSDistro
                  (if known), and the kubernetes version as defined by the packages produced by
                  kubernetes/release: v1.13.0, v1.12.5-mybuild.1, or v1.17.3. For example, the default
                  image format of {{.BaseRegistry}}/{{.OSDistro}}-{{.OSVersion}}:{{.KubernetesVersion}}.gz will
                  attempt to pull the image from that location. See also: https://golang.org/pkg/text/template/
                type: string
              imageLookupOSDistro:
                description: |-
                  ImageLookupOSDistro is the name of the OS distro to use when fetching machine images,
                  if not set it will default to ubuntu.
                type: string
              imageLookupOSVersion:
                description: |-
                  ImageLookupOSVersion is the version of the OS distribution to use when fetching machine
                  images. If not set it will default based on ImageLookupOSDistro.
                type: string
              providerID:
                description: providerID must match the provider ID as seen on the
                  node object corresponding to this machine.
                maxLength: 512
                minLength: 1
                type: string
              templateOverride:
                description: |-
                  TemplateOverride overrides the default Tinkerbell template used by CAPT.
                  You can learn more about Tinkerbell templates here: https://tinkerbell.org/docs/concepts/templates/
                type: string
            type: object
          status:
            description: TinkerbellMachineStatus defines the observed state of TinkerbellMachine.
            properties:
              addresses:
                description: Addresses contains the Tinkerbell device associated addresses.
                items:
                  description: NodeAddress contains information for the node's address.
                  properties:
                    address:
                      description: The node address.
                      type: string
                    type:
                      description: Node address type, one of Hostname, ExternalIP
                        or InternalIP.
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              conditions:
                description: |-
                  Conditions defines current service state of the TinkerbellMachine.
                  Required to satisfy the Cluster API conditions.Getter/conditions.Setter
                  interface contract. The CAPI framework may call GetConditions/SetConditions
                  via interface assertion.
                items:
                  description: Condition defines an observation of a Cluster API resource
                    operational state.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed. If that is not known, then using the time when
                        the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This field may be empty.
                      maxLength: 10240
                      minLength: 1
                      type: string
                    reason:
                      description: |-
                        reason is the reason for the condition's last transition in CamelCase.
                        The specific API may choose whether or not this field is considered a guaranteed API.
                        This field may be empty.
                      maxLength: 256
                      minLength: 1
                      type: string
                    severity:
                      description: |-
                        severity provides an explicit classification of Reason code, so the users or machines can immediately
                        understand the current situation and act accordingly.
                        The Severity field MUST be set only when Status=False.
                      maxLength: 32
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions
                        can be useful (see .node.status.conditions), the ability to deconflict is important.
                      maxLength: 256
                      minLength: 1
                      type: string
                  required:
                  - lastTransitionTime
                  - status
                  - type
                  type: object
                type: array
              errorMessage:
                description: |-
                  ErrorMessage will be set in the event that there is a terminal problem
                  reconciling the Machine and will contain a more verbose string suitable
                  for logging and human consumption.

                  This field should not be set for transitive errors that a controller
                  faces that are expected to be fixed automatically over
                  time (like service outages), but instead indicate that something is
                  fundamentally wrong with the Machine's spec or the configuration of
                  the controller, and that manual intervention is required. Examples
                  of terminal errors would be invalid combinations of settings in the
                  spec, values that are unsupported by the controller, or the
                  responsible controller itself being critically misconfigured.

                  Any transient errors that occur during the reconciliation of Machines
                  can be added as events to the Machine object and/or logged in the
                  controller's output.
                type: string
              errorReason:
                description: |-
                  Any transient errors that occur during the reconciliation of Machines
                  can be added as events to the Machine object and/or logged in the
                  controller's output.
                type: string
              externalTargetNamespace:
                description: |-
                  ExternalTargetNamespace is the resolved namespace on the external Tinkerbell cluster
                  where resources (Template, Workflow, Job) for this machine are created.
                  It is computed once during hardware selection and persisted so that subsequent
                  reconcile loops (including deletion when the Hardware object may be gone) always
                  target the correct namespace without re-deriving it.
                  Empty in local (non-external) mode.
                type: string
              initialization:
                description: |-
                  Initialization provides observations of the TinkerbellMachine initialization process.
                  NOTE: Fields in this struct are part of the Cluster API contract and are used to orchestrate initial Machine provisioning.
                minProperties: 1
                properties:
                  provisioned:
                    description: |-
                      provisioned is true when the infrastructure provider reports that the Machine's infrastructure is fully provisioned.
                      NOTE: this field is part of the Cluster API contract, and it is used to orchestrate initial Machine provisioning.
                    type: boolean
                type: object
              instanceStatus:
                description: InstanceStatus is the status of the Tinkerbell device
                  instance for this machine.
                type: integer
              ready:
                description: Ready is true when the provider resource is ready.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
