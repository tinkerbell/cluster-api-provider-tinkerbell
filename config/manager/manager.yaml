apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      containers:
      - env:
          - name: TINKERBELL_IP
            value: ${TINKERBELL_IP:=''}
          - name: REMOTE_TINKERBELL_API_URL
            value: ${REMOTE_TINKERBELL_API_URL:=''}
          - name: REMOTE_TINKERBELL_API_TOKEN
            value: ${REMOTE_TINKERBELL_API_TOKEN:=''}
          - name: REMOTE_TINKERBELL_API_INSECURE
            value: ${REMOTE_TINKERBELL_API_INSECURE:='false'}
          - name: REMOTE_TINKERBELL_WATCH_NAMESPACE
            value: ${REMOTE_TINKERBELL_WATCH_NAMESPACE:=''}
        args:
        - --leader-elect
        image: tinkerbell-controller
        imagePullPolicy: IfNotPresent
        name: manager
        ports:
        - containerPort: 9440
          name: healthz
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: healthz
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
        resources:
          limits:
            cpu: 200m
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 20Mi
        volumeMounts:
        - name: remote-tinkerbell-kubeconfig
          mountPath: /etc/remote-tinkerbell
          readOnly: true
      terminationGracePeriodSeconds: 10
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
      volumes:
      - name: remote-tinkerbell-kubeconfig
        secret:
          secretName: ${REMOTE_TINKERBELL_KUBECONFIG:=remote-tinkerbell-kubeconfig}
          optional: true
      serviceAccountName: controller-manager
