# mkosi-based Kubernetes CAPI node image builder for Tinkerbell
#
# Build with: make build
# Release, ImageId and Architecture are passed dynamically from the Makefile via --setting flags.
# Architecture-specific bootloader/repart configuration lives in mkosi.conf.d/20-{amd64,arm64}.conf.

[Distribution]
Distribution=ubuntu

[Output]
Format=disk
CompressOutput=none
# Deterministic partition UUIDs for reproducibility
Seed=b83e6e82-40a0-4469-a082-1801f87e4a9f

[Content]
Bootable=yes
Bootloader=grub
# Kernel command line for serial console (useful for Tinkerbell/bare-metal)
KernelCommandLine=console=ttyS0,115200 console=tty0
CleanPackageMetadata=yes

[Build]
WithNetwork=yes

[Validation]
Checksum=yes
