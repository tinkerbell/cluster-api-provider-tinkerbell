# Packages for Ubuntu 24.04 (Noble)

[Content]
Packages=
        linux-generic
        systemd
        systemd-sysv
        systemd-resolved
        dbus
        cloud-init
        openssh-server
        ca-certificates
        curl
        gnupg
        locales
        # Architecture-specific bootloader packages live in 20-{amd64,arm64}.conf
        # Kubernetes node dependencies
        conntrack
        socat
        ebtables
        ethtool
        iptables
        iproute2
        util-linux
        # Storage
        open-iscsi
        nfs-common
        lvm2
        # Miscellaneous
        bash-completion
        sudo
        less
        jq
        iputils-ping
        # Needed for growpart on first boot
        cloud-guest-utils
