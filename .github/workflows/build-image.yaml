name: Build and Push Kubernetes Node Image

on:
  workflow_dispatch:
    inputs:
      kubernetesVersion:
        description: "Kubernetes version (e.g., v1.35.2)"
        required: true
        default: "v1.35.2"

env:
  REGISTRY: ghcr.io
  KUBERNETES_VERSION: ${{ inputs.kubernetesVersion || 'v1.35.2' }}
  UBUNTU_VERSION: "24.04"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: setup-mkosi
        uses: systemd/mkosi@v26

      - name: Build image
        run: |
          make build \
            KUBERNETES_VERSION=${{ env.KUBERNETES_VERSION }} \
            UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}

      - name: Validate image
        run: |
          make validate \
            UBUNTU_VERSION=${{ env.UBUNTU_VERSION }} \
            KUBERNETES_VERSION=${{ env.KUBERNETES_VERSION }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ env.UBUNTU_VERSION }}-k8s-${{ env.KUBERNETES_VERSION }}
          path: |
            mkosi.output/${{ env.UBUNTU_VERSION }}/${{ env.KUBERNETES_VERSION }}/*.raw.gz
            mkosi.output/${{ env.UBUNTU_VERSION }}/${{ env.KUBERNETES_VERSION }}/*.sha256
          retention-days: 2

  push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-${{ env.UBUNTU_VERSION }}-k8s-${{ env.KUBERNETES_VERSION }}
          path: mkosi.output/${{ env.UBUNTU_VERSION }}/${{ env.KUBERNETES_VERSION }}/

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to OCI registry
        run: |
          make push \
            KUBERNETES_VERSION=${{ env.KUBERNETES_VERSION }}
