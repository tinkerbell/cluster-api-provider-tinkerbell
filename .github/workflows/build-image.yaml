name: Build and Push Kubernetes Node Image
run-name: Build k8s ${{ inputs.kubernetesVersion || 'v1.35.2' }} (ubuntu 24.04)

on:
  workflow_dispatch:
    inputs:
      kubernetesVersion:
        description: "Kubernetes version (e.g., v1.35.2)"
        required: true
        default: "v1.35.2"

env:
  REGISTRY: ghcr.io
  KUBERNETES_VERSION: ${{ inputs.kubernetesVersion || 'v1.35.2' }}
  UBUNTU_VERSION: "24.04"

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: setup-mkosi
        uses: systemd/mkosi@v26

      - name: Install mkosi Python dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends python3-pefile mtools

      - name: Build image
        working-directory: image-builder
        run: |
          make build \
            ARCH=${{ matrix.arch }} \
            KUBERNETES_VERSION=${{ env.KUBERNETES_VERSION }} \
            UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}

      - name: Validate image
        working-directory: image-builder
        run: |
          make validate \
            ARCH=${{ matrix.arch }} \
            UBUNTU_VERSION=${{ env.UBUNTU_VERSION }} \
            KUBERNETES_VERSION=${{ env.KUBERNETES_VERSION }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-${{ env.UBUNTU_VERSION }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}
          path: |
            image-builder/mkosi.output/${{ env.UBUNTU_VERSION }}/${{ env.KUBERNETES_VERSION }}/${{ matrix.arch }}/*.raw.gz
            image-builder/mkosi.output/${{ env.UBUNTU_VERSION }}/${{ env.KUBERNETES_VERSION }}/${{ matrix.arch }}/*.sha256
          retention-days: 2

  push:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: ubuntu-${{ env.UBUNTU_VERSION }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}
          path: image-builder/mkosi.output/${{ env.UBUNTU_VERSION }}/${{ env.KUBERNETES_VERSION }}/${{ matrix.arch }}/

      - name: Install oras
        uses: oras-project/setup-oras@v2

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Push image to OCI registry
        working-directory: image-builder
        run: |
          make push \
            ARCH=${{ matrix.arch }} \
            KUBERNETES_VERSION=${{ env.KUBERNETES_VERSION }} \
            OCI_REGISTRY=${{ env.REGISTRY }} \
            OCI_REPOSITORY=${OWNER_LC}/cluster-api-provider-tinkerbell/ubuntu
